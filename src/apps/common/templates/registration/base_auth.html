{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chronos{% endblock %}</title>

    <style>
        :root {
            --page: #f5f7fb;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --ink: #101828;
            --muted: #667085;
            --line: #dde5f0;
            --line-strong: #cbd5e1;
            --brand: #0f766e;
            --brand-dark: #115e59;
            --success: #15803d;
            --success-bg: #dcfce7;
            --danger: #b91c1c;
            --danger-bg: #fee2e2;
            --shadow: 0 24px 70px rgba(16, 24, 40, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--ink);
            background-color: var(--page);
            background-image:
                linear-gradient(rgba(15, 23, 42, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.045) 1px, transparent 1px);
            background-size: 42px 42px;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .auth-container {
            width: min(100%, 430px);
        }

        .brand {
            display: grid;
            justify-items: center;
            gap: 12px;
            margin-bottom: 24px;
            text-align: center;
        }

        .brand-logo {
            width: 58px;
            height: 58px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: var(--brand);
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            box-shadow: inset 0 -10px 20px rgba(0, 0, 0, 0.12);
        }

        .brand h1 {
            font-size: 30px;
            line-height: 1.08;
            letter-spacing: 0;
        }

        .brand p {
            max-width: 320px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
            font-weight: 600;
        }

        .card {
            padding: 28px;
            background: var(--surface);
            border: 1px solid rgba(203, 213, 225, 0.9);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            color: var(--ink);
            font-size: 25px;
            line-height: 1.08;
            margin-bottom: 8px;
        }

        .card-description {
            margin-bottom: 24px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #344054;
            font-size: 13px;
            font-weight: 800;
        }

        input {
            width: 100%;
            min-height: 52px;
            padding: 14px 15px;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            background: var(--surface-soft);
            color: var(--ink);
            font-size: 15px;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        input::placeholder {
            color: #98a2b3;
        }

        input:focus {
            border-color: var(--brand);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.13);
        }

        button,
        .button {
            width: 100%;
            min-height: 54px;
            padding: 14px 16px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: var(--brand);
            color: #fff;
            font-size: 15px;
            font-weight: 850;
            text-decoration: none;
            text-align: center;
            display: inline-grid;
            place-items: center;
            box-shadow: 0 14px 28px rgba(15, 118, 110, 0.22);
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        button:hover,
        .button:hover {
            background: var(--brand-dark);
            transform: translateY(-1px);
        }

        button:active,
        .button:active {
            transform: translateY(0);
        }

        .links {
            margin-top: 18px;
            display: grid;
            gap: 10px;
            text-align: center;
        }

        a {
            color: var(--brand);
            text-decoration: none;
            font-size: 14px;
            font-weight: 800;
        }

        a:hover {
            text-decoration: underline;
        }

        .errorlist {
            list-style: none;
            margin-bottom: 10px;
            padding: 12px 14px;
            border-radius: 8px;
            color: var(--danger);
            background: var(--danger-bg);
            border: 1px solid #fecaca;
            font-size: 14px;
            font-weight: 750;
            line-height: 1.45;
        }

        .helptext {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
            font-weight: 650;
        }

        .success-message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 8px;
            color: var(--success);
            background: var(--success-bg);
            border: 1px solid #bbf7d0;
            font-size: 14px;
            font-weight: 750;
            line-height: 1.45;
        }

        .muted {
            color: var(--muted);
        }

        @media (max-width: 540px) {
            body {
                padding: 16px;
                place-items: stretch;
            }

            .auth-container {
                align-self: center;
            }

            .card {
                padding: 22px;
            }

            .brand h1 {
                font-size: 27px;
            }
        }
    </style>
</head>

<body>
    <main class="auth-container">
        <section class="brand">
            <div class="brand-logo">C</div>

            <div>
                <h1>Chronos</h1>
                <p>Controle de ponto simples, seguro e bonito.</p>
            </div>
        </section>

        <section class="card">
            {% block content %}{% endblock %}
        </section>
    </main>
</body>
</html>
