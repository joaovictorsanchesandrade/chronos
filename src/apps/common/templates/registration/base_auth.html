{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chronos{% endblock %}</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --card-light: #1f2937;
            --primary: #38bdf8;
            --primary-dark: #0284c7;
            --text: #f8fafc;
            --muted: #94a3b8;
            --danger: #f87171;
            --success: #34d399;
            --border: rgba(255,255,255,.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(56,189,248,.2), transparent 35%),
                radial-gradient(circle at bottom right, rgba(99,102,241,.18), transparent 35%),
                var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-container {
            width: 100%;
            max-width: 430px;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand-logo {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: #020617;
            font-size: 30px;
            font-weight: 800;
            box-shadow: 0 20px 60px rgba(56,189,248,.25);
        }

        .brand h1 {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .brand p {
            color: var(--muted);
            font-size: 14px;
        }

        .card {
            background: rgba(17,24,39,.88);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 24px 80px rgba(0,0,0,.35);
            backdrop-filter: blur(12px);
        }

        .card h2 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .card-description {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: block;
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            background: var(--card-light);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 14px;
            outline: none;
            font-size: 15px;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(56,189,248,.12);
        }

        button, .button {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 12px 16px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: #020617;
            font-weight: 800;
            font-size: 15px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        button:hover, .button:hover {
            filter: brightness(1.08);
        }

        .links {
            margin-top: 18px;
            display: grid;
            gap: 10px;
            text-align: center;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }

        .errorlist {
            list-style: none;
            background: rgba(248,113,113,.12);
            border: 1px solid rgba(248,113,113,.25);
            color: #fecaca;
            border-radius: 14px;
            padding: 12px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .helptext {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-top: 6px;
            line-height: 1.4;
        }

        .success-message {
            background: rgba(52,211,153,.12);
            border: 1px solid rgba(52,211,153,.25);
            color: #bbf7d0;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .muted {
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main class="auth-container">
        <section class="brand">
            <div class="brand-logo">C</div>
            <h1>Chronos</h1>
            <p>Controle de ponto simples, seguro e bonito.</p>
        </section>

        <section class="card">
            {% block content %}{% endblock %}
        </section>
    </main>
</body>
</html>
