{% extends "registration/base_auth.html" %}

{% block title %}Recuperar senha | Chronos{% endblock %}

{% block content %}
<h2>Recuperar senha</h2>
<p class="card-description">Informe seu e-mail para receber as instruções de recuperação.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Enviar instruções</button>
</form>

<div class="links">
    <a href="{% url 'login' %}">Voltar para login</a>
</div>
{% endblock %}
