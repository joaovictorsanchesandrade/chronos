{% extends "registration/base_auth.html" %}

{% block title %}Criar conta | Chronos{% endblock %}

{% block content %}
<h2>Criar conta</h2>
<p class="card-description">Crie sua conta para começar a usar o Chronos.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Criar conta</button>
</form>

<div class="links">
    <a href="{% url 'login' %}">Já tenho uma conta</a>
</div>
{% endblock %}
